
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Highlights</title>

  <style>
    body {
      font-family: Arial, sans-serif;
    }

    h2 {
      text-align: center;
      margin-top: 30px;
    }

    .table-container {
      display: flex;
      justify-content: space-between;
      gap: 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #eee;
    }

    .section {
      margin-bottom: 40px;
    }

    .half {
      width: 50%;
    }

    .logo-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .logo {
      height: 30px;
    }

  </style>
</head>

<body>

<h1 style="text-align:center;">DH Cup Highlights</h1>

<div id="content"></div>

<script>

fetch("highlights.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("content");

    // ✅ Helper to build tables
    function buildTable(title, rows, columns) {
      let html = `<h3>${title}</h3><table><tr>`;
      
      columns.forEach(col => {
        html += `<th>${col}</th>`;
      });

      html += "</tr>";

      rows.forEach(r => {
        html += "<tr>";
        columns.forEach(col => {
          html += `<td>${Array.isArray(r[col]) ? r[col].join(", ") : r[col]}</td>`;
        });
        html += "</tr>";
      });

      html += "</table>";
      return html;
    }

    // ✅ SIDE-BY-SIDE SECTION
    function sideBySide(title, dallas, houston, columns) {
      return `
        <div class="section">
          <h2>${title}</h2>
          <div class="table-container">

            <div class="half">
              <div class="logo-header">
                <img src="images/dallas.png" class="logollas</h3>
              </div>
              ${buildTable("", dallas, columns)}
            </div>

            <div class="half">
              <div class="logo-header">
                <img src="images/houston.png" class="logouston</h3>
              </div>
              ${buildTable("", houston, columns)}
            </div>

          </div>
        </div>
      `;
    }

    // ===== MVP =====
    container.innerHTML += sideBySide(
      "MVP Leaders",
      data.mvpLeaders.dallas,
      data.mvpLeaders.houston,
      ["player", "count", "years"]
    );

    // ===== 3-0 =====
    container.innerHTML += sideBySide(
      "3-0 Performances",
      data.threeAndZero.dallas,
      data.threeAndZero.houston,
      ["player", "count", "years"]
    );

    // ===== 0-3 =====
    container.innerHTML += sideBySide(
      "0-3 Performances",
      data.zeroAndThree.dallas,
      data.zeroAndThree.houston,
      ["player", "count", "years"]
    );

    // ===== Blowouts =====
    function blowoutSection(title, rows) {
      return `
        <div class="section">
          <h2>${title}</h2>
          ${buildTable("", rows, ["year", "format", "match", "result", "winner"])}
        </div>
      `;
    }

    container.innerHTML += blowoutSection(
      "Top 10 Biggest Blowouts",
      data.blowouts.overallTop10
    );

    container.innerHTML += blowoutSection(
      "Top 5 Singles Blowouts",
      data.blowouts.singlesTop5
    );

    container.innerHTML += blowoutSection(
      "Top 5 Scramble Blowouts",
      data.blowouts.scrambleTop5
    );

    container.innerHTML += blowoutSection(
      "Top 5 Best Ball Blowouts",
      data.blowouts.bestBallTop5
    );

    container.innerHTML += blowoutSection(
      "Top 5 Alternate Shot Blowouts",
      data.blowouts.altShotTop5
    );

  });

</script>

</body>
</html>
