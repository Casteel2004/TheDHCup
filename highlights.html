
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Highlights</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h1, h2, h3 {
      text-align: center;
    }

    .section {
      margin-bottom: 50px;
    }

    .table-container {
      display: flex;
      gap: 40px;
      justify-content: center;
    }

    .half {
      width: 45%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f2f2f2;
    }

  </style>
</head>

<body>

<h1>DH Cup Highlights</h1>

<div id="content"></div>

<script>

fetch("highlights.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("content");

    // ✅ TABLE BUILDER (clean + simple)
    function buildTable(rows, columns) {
      let html = "<table><tr>";

      columns.forEach(col => {
        html += `<th>${col}</th>`;
      });

      html += "</tr>";

      rows.forEach(row => {
        html += "<tr>";
        columns.forEach(col => {
          let value = row[col];

          // Handle arrays (years)
          if (Array.isArray(value)) {
            value = value.join(", ");
          }

          html += `<td>${value ?? ""}</td>`;
        });
        html += "</tr>";
      });

      html += "</table>";
      return html;
    }

    // ✅ SIDE-BY-SIDE SECTION
    function sideBySide(title, dallas, houston) {
      return `
        <div class="section">
          <h2>${title}</h2>

          <div class="table-container">

            <div class="half">
              <h3>Dallas</h3>
              ${buildTable(dallas, ["player", "count", "years"])}
            </div>

            <div class="half">
              <h3>Houston</h3>
              ${buildTable(houston, ["player", "count", "years"])}
            </div>

          </div>
        </div>
      `;
    }

    // ✅ BLOWOUT TABLE
    function blowoutSection(title, rows, includeFormat = false) {

      let columns = includeFormat
        ? ["year", "format", "match", "result", "winner"]
        : ["year", "match", "result", "winner"];

      return `
        <div class="section">
          <h2>${title}</h2>
          ${buildTable(rows, columns)}
        </div>
      `;
    }

    // ===== MVP =====
    container.innerHTML += sideBySide(
      "MVP Leaders",
      data.mvpLeaders.dallas,
      data.mvpLeaders.houston
    );

    // ===== 3-0 =====
    container.innerHTML += sideBySide(
      "3-0 Performances",
      data.threeAndZero.dallas,
      data.threeAndZero.houston
    );

    // ===== 0-3 =====
    container.innerHTML += sideBySide(
      "0-3 Performances",
      data.zeroAndThree.dallas,
      data.zeroAndThree.houston
    );

    // ===== BLOWOUTS =====
    container.innerHTML += blowoutSection(
      "Top 10 Biggest Blowouts",
      data.blowouts.overallTop10,
      true
    );

    container.innerHTML += blowoutSection(
      "Top 5 Singles Blowouts",
      data.blowouts.singlesTop5
    );

    container.innerHTML += blowoutSection(
      "Top 5 Scramble Blowouts",
      data.blowouts.scrambleTop5
    );

    container.innerHTML += blowoutSection(
      "Top 5 Best Ball Blowouts",
      data.blowouts.bestBallTop5
    );

    container.innerHTML += blowoutSection(
      "Top 5 Alternate Shot Blowouts",
      data.blowouts.altShotTop5
    );

  })
  .catch(err => {
    console.error("Error loading highlights.json:", err);
  });

</script>

</body>
</html>
