
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Highlights</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
      padding: 12px 30px;
      box-sizing: border-box;
      flex-wrap: wrap;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-left img {
      height: 55px;
      border-radius: 50%;
    }

    .nav-links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
      margin-right: 12px;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .nav {
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-links {
        margin-top: 10px;
      }
    }

    /* HERO */
    .hero {
      margin-top: 120px;
      padding: 120px 20px;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
                  url("./golf-bg.jpg");
      background-size: cover;
    }

    .hero h1 {
      color: gold;
      font-size: 55px;
    }

    .content {
      width: 96%;
      max-width: 1400px;
      margin: 40px auto;
      padding: 20px;
    }

    h2 {
      color: gold;
      margin-top: 40px;
    }

    h3 {
      color: #60a5fa;
      margin-top: 20px;
    }

    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
      margin-top: 10px;
    }

    th {
      color: gold;
      text-align: center; /* ✅ FIX */
      padding: 10px;
      border-bottom: 1px solid #444;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #444;
      text-align: left;
    }

    tr:hover {
      background: #374151;
    }

  </style>
</head>

<body>

<div class="nav">
  <div class="nav-left">
    ./logo-circle.png
    DH Cup
  </div>

  <div class="nav-links">
    index.htmlHome</a>
    history.htmlHistory</a>
    highlights.htmlHighlights</a>
  </div>
</div>

<div class="hero">
  <h1>DH Cup Highlights</h1>
</div>

<div class="content" id="content"></div>

<script>
fetch('highlights.json')
.then(res => res.json())
.then(data => {

  const c = document.getElementById('content');

  // ✅ GENERIC TABLE BUILDER
  function buildTable(title, rows, headers) {
    let html = `<h3>${title}</h3><div class="table-container"><table><tr>`;
    headers.forEach(h => html += `<th>${h}</th>`);
    html += `</tr>`;

    rows.forEach(r => {
      html += "<tr>";
      headers.forEach(key => {
        const fieldMap = {
          "Name": r.name,
          "#": r.count,
          "Years": r.years,
          "Year": r.year,
          "Format": r.format,
          "Players": r.players,
          "Winner": r.winner,
          "Result": r.result
        };
        html += `<td>${fieldMap[key] || ""}</td>`;
      });
      html += "</tr>";
    });

    html += "</table></div>";
    return html;
  }

  // ✅ SORT + TOP 5 FUNCTION
  function getTop5(rows) {
    return rows
      .map(r => ({
        ...r,
        rank: parseInt(r.result) || 0
      }))
      .sort((a,b) => b.rank - a.rank)
      .slice(0,5);
  }

  // ✅ MVP
  c.innerHTML += `<h2>MVP Leaders</h2>`;
  c.innerHTML += buildTable("Dallas", data.mvpLeaders.dallas, ["Name","#","Years"]);
  c.innerHTML += buildTable("Houston", data.mvpLeaders.houston, ["Name","#","Years"]);

  // ✅ 3-0 (FIXED HEADERS)
  c.innerHTML += `<h2>3–0 Performances</h2>`;
  c.innerHTML += buildTable("Dallas", data.threeAndZero.dallas, ["Name","#","Years"]);
  c.innerHTML += buildTable("Houston", data.threeAndZero.houston, ["Name","#","Years"]);

  // ✅ 0-3 (FIXED HEADERS)
  c.innerHTML += `<h2>0–3 Performances</h2>`;
  c.innerHTML += buildTable("Dallas", data.zeroAndThree.dallas, ["Name","#","Years"]);
  c.innerHTML += buildTable("Houston", data.zeroAndThree.houston, ["Name","#","Years"]);

  // ✅ BLOWOUTS (TOP 5 LOGIC ADDED)
  c.innerHTML += `<h2>Biggest Blowouts</h2>`;

  c.innerHTML += buildTable(
    "Overall",
    getTop5(data.blowouts.overall),
    ["Year","Format","Players","Winner","Result"]
  );

  c.innerHTML += buildTable(
    "Singles",
    getTop5(data.blowouts.singles),
    ["Year","Players","Winner","Result"]
  );

  c.innerHTML += buildTable(
    "Scramble",
    getTop5(data.blowouts.scramble),
    ["Year","Players","Winner","Result"]
  );

  c.innerHTML += buildTable(
    "Best Ball",
    getTop5(data.blowouts.bestBall),
    ["Year","Players","Winner","Result"]
  );

  c.innerHTML += buildTable(
    "Alternate Shot",
    getTop5(data.blowouts.alternateShot),
    ["Year","Players","Winner","Result"]
  );

});
</script>

</body>
</html>
