
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Highlights</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      z-index: 999;
      flex-wrap: wrap;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-left img {
      height: 55px;
      border-radius: 50%;
    }

    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .nav-links a:hover {
      color: gold;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    /* HERO */
    .hero {
      margin-top: 120px;
      padding: 120px 20px;
      text-align: center;
      background:
        linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
        url("./golf-bg.jpg");
      background-size: cover;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 20px;
    }

    /* CONTENT */
    .content {
      width: 98%;
      max-width: 1600px;
      margin: 40px auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-top: 40px;
      color: #60a5fa;
    }

    h3 {
      text-align: center;
      margin-top: 10px;
    }

    .dallas-header { color: #60a5fa; }
    .houston-header { color: #f87171; }

    .section {
      margin-bottom: 40px;
    }

    .table-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .half {
      width: 48%;
      min-width: 300px;
    }

    .table-container {
      overflow-x: auto;
    }

    /* ✅ KEY CHANGE: AUTO TABLE LAYOUT */
    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
      table-layout: auto; /* ✅ allows natural sizing */
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #444;
      text-align: center;

      /* ✅ KEY: STOP WRAPPING */
      white-space: nowrap;
    }

    /* HEADERS */
    th {
      color: gold;
      border-bottom: 2px solid #facc15;
      letter-spacing: 0.5px;
    }

    thead tr {
      border-bottom: 3px solid #facc15;
    }

    tr:hover {
      background: #374151;
    }

    /* ROW COLORS */
    tr.dallas-win {
      background-color: rgba(37, 99, 235, 0.35);
      font-weight: bold;
    }

    tr.houston-win {
      background-color: rgba(220, 38, 38, 0.35);
      font-weight: bold;
    }

    /* ✅ BETTER COLUMN BALANCE */

    /* 5-column tables */
    table th:nth-child(1), table td:nth-child(1) { width: 8%; }
    table th:nth-child(2), table td:nth-child(2) { width: 12%; }
    table th:nth-child(3), table td:nth-child(3) { width: 45%; }
    table th:nth-child(4), table td:nth-child(4) { width: 15%; }
    table th:nth-child(5), table td:nth-child(5) { width: 10%; }

    /* 3-column tables */
    .half table th:nth-child(1), .half table td:nth-child(1) { width: 35%; }
    .half table th:nth-child(2), .half table td:nth-child(2) { width: 15%; }
    .half table th:nth-child(3), .half table td:nth-child(3) { width: 50%; }

    @media (max-width: 768px) {
      .hero { margin-top: 160px; }
      .hero h1 { font-size: 38px; }
      .half { width: 100%; }
    }

  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">
    <img src="./logo-circle.png">
    DH Cup
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="timeline.html">Timeline</a>
    <a href="history.html">History</a>
    <a href="highlights.html" class="active">Highlights</a>
    <a href="players.html">Players</a>
    <a href="streaks.html">Streaks</a>
    <a href="teammates.html">Teammates</a>
    <a href="handicap.html">Handicap History</a>
    <a href="years.html">Year by Year Results</a>
  </div>
</div>

<div class="hero">
  <h1>DH Cup Highlights</h1>
  <p>The best (and worst) performances in DH Cup history</p>
</div>

<div class="content" id="content"></div>

<script>
fetch("highlights.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("content");

  function formatHeader(col) {
    return col.charAt(0).toUpperCase() + col.slice(1);
  }

  function formatMatch(match, winner) {
    if (!match || !match.includes(" vs ")) return match;
    const [a, b] = match.split(" vs ");
    return winner === "Houston" ? `${b} def ${a}` : `${a} def ${b}`;
  }

  function buildTable(rows, cols) {
    let html = `<table><thead><tr>`;

    cols.forEach(c => html += `<th>${formatHeader(c)}</th>`);
    html += `</tr></thead><tbody>`;

    rows.forEach(r => {
      let rowClass = r.winner === "Dallas" ? "dallas-win" :
                     r.winner === "Houston" ? "houston-win" : "";

      html += `<tr class="${rowClass}">`;

      cols.forEach(c => {
        let val = c === "match" ? formatMatch(r.match, r.winner) : r[c];
        if (Array.isArray(val)) val = val.join(", ");
        html += `<td>${val ?? ""}</td>`;
      });

      html += `</tr>`;
    });

    return html + `</tbody></table>`;
  }

  function sideSection(title, dallas, houston) {
    return `
      <div class="section">
        <h2>${title}</h2>
        <div class="table-row">
          <div class="half">
            <h3 class="dallas-header">Dallas</h3>
            ${buildTable(dallas, ["player","count","years"])}
          </div>
          <div class="half">
            <h3 class="houston-header">Houston</h3>
            ${buildTable(houston, ["player","count","years"])}
          </div>
        </div>
      </div>
    `;
  }

  function singleSection(title, rows, full=false) {
    const cols = full
      ? ["year","format","match","result","winner"]
      : ["year","match","result","winner"];

    return `
      <div class="section">
        <h2>${title}</h2>
        ${buildTable(rows, cols)}
      </div>
    `;
  }

  container.innerHTML += sideSection("MVP Leaders", data.mvpLeaders.dallas, data.mvpLeaders.houston);
  container.innerHTML += sideSection("3-0 Performances", data.threeAndZero.dallas, data.threeAndZero.houston);
  container.innerHTML += sideSection("0-3 Performances", data.zeroAndThree.dallas, data.zeroAndThree.houston);

  container.innerHTML += singleSection("Top 10 Biggest Blowouts", data.blowouts.overallTop10, true);
  container.innerHTML += singleSection("Top 5 Singles Blowouts", data.blowouts.singlesTop5);
  container.innerHTML += singleSection("Top 5 Scramble Blowouts", data.blowouts.scrambleTop5);
  container.innerHTML += singleSection("Top 5 Best Ball Blowouts", data.blowouts.bestBallTop5);
  container.innerHTML += singleSection("Top 5 Alternate Shot Blowouts", data.blowouts.altShotTop5);

});
</script>

</body>
</html>
