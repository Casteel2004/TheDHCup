
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DH Cup Highlights</title>

  <!-- ✅ YOUR EXISTING SITE CSS -->
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      /* ✅ Background (match your other pages) */
      background: url('images/background.jpg') no-repeat center center fixed;
      background-size: cover;
      color: white;
    }

    /* ✅ Overlay for readability */
    .page-container {
      background-color: rgba(0, 0, 0, 0.8);
      padding: 20px;
      min-height: 100vh;
    }

    h1, h2, h3 {
      text-align: center;
    }

    .section {
      margin-bottom: 50px;
    }

    /* ✅ SIDE-BY-SIDE TABLES */
    .table-container {
      display: flex;
      gap: 40px;
      justify-content: center;
      flex-wrap: wrap; /* ✅ MOBILE FIX */
    }

    .half {
      width: 45%;
      min-width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      text-align: center;
      background-color: rgba(255,255,255,0.95);
      color: black;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
    }

    th {
      background-color: #eee;
    }

    /* ✅ NAVBAR (matches other pages) */
    .navbar {
      display: flex;
      justify-content: center;
      gap: 25px;
      padding: 15px;
      background-color: black;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .navbar a:hover {
      color: gold;
    }

    /* ✅ LOGO HEADER */
    .title-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .team-logo {
      height: 50px;
    }

  </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="stats.html">Stats</a>
  <a href="history.html">History</a>
  <a href="highlights.html">Highlights</a>
</div>

<div class="page-container">

  <!-- ✅ HEADER + LOGOS -->
  <div class="title-row">
    <img src="images/dallas.png" class="team-logo">
    <h1>DH Cup Highlights</h1>
    <img src="images/houston.png" class="team-logo">
  </div>

  <div id="content"></div>

</div>

<script>

fetch("highlights.json")
  .then(res => res.json())
  .then(data => {

    const container = document.getElementById("content");

    function buildTable(rows, columns) {
      let html = "<table><tr>";

      columns.forEach(col => {
        html += `<th>${col}</th>`;
      });

      html += "</tr>";

      rows.forEach(row => {
        html += "<tr>";
        columns.forEach(col => {
          let value = row[col];
          if (Array.isArray(value)) value = value.join(", ");
          html += `<td>${value ?? ""}</td>`;
        });
        html += "</tr>";
      });

      html += "</table>";
      return html;
    }

    function sideBySide(title, dallas, houston) {
      return `
        <div class="section">
          <h2>${title}</h2>

          <div class="table-container">
            <div class="half">
              <h3>Dallas</h3>
              ${buildTable(dallas, ["player","count","years"])}
            </div>

            <div class="half">
              <h3>Houston</h3>
              ${buildTable(houston, ["player","count","years"])}
            </div>
          </div>
        </div>
      `;
    }

    function blowoutSection(title, rows, includeFormat=false) {
      const cols = includeFormat
        ? ["year","format","match","result","winner"]
        : ["year","match","result","winner"];

      return `
        <div class="section">
          <h2>${title}</h2>
          ${buildTable(rows, cols)}
        </div>
      `;
    }

    // ✅ SECTIONS
    container.innerHTML += sideBySide("MVP Leaders", data.mvpLeaders.dallas, data.mvpLeaders.houston);
    container.innerHTML += sideBySide("3-0 Performances", data.threeAndZero.dallas, data.threeAndZero.houston);
    container.innerHTML += sideBySide("0-3 Performances", data.zeroAndThree.dallas, data.zeroAndThree.houston);

    container.innerHTML += blowoutSection("Top 10 Biggest Blowouts", data.blowouts.overallTop10, true);
    container.innerHTML += blowoutSection("Top 5 Singles Blowouts", data.blowouts.singlesTop5);
    container.innerHTML += blowoutSection("Top 5 Scramble Blowouts", data.blowouts.scrambleTop5);
    container.innerHTML += blowoutSection("Top 5 Best Ball Blowouts", data.blowouts.bestBallTop5);
    container.innerHTML += blowoutSection("Top 5 Alternate Shot Blowouts", data.blowouts.altShotTop5);

  });

</script>

</body>
</html>
