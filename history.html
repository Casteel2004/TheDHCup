
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      z-index: 999;
      flex-wrap: wrap;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-left img {
      height: 55px;
      border-radius: 50%;
    }

    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .nav-links a:hover {
      color: gold;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .nav {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        width: 100%;
        flex-wrap: wrap;
        margin-top: 10px;
      }
    }

    /* HERO */
    .hero {
      margin-top: 120px;
      padding: 120px 20px;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
                  url("./golf-bg.jpg");
      background-size: cover;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 20px;
    }

    /* CONTENT */
    .content {
      width: 98%;
      max-width: 1600px;
      margin: 40px auto;
      padding: 20px;
    }

    .record {
      text-align: center;
      font-size: 30px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .record.dallas {
      color: #60a5fa;
    }

    .record.houston {
      color: #f87171;
    }

    #extraStats {
      text-align: center;
      font-size: 18px;
      margin-bottom: 30px;
    }

    /* TABLE */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
      table-layout: fixed;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #444;
      text-align: center;
      white-space: normal;
      word-wrap: break-word;
    }

    th {
      color: gold;
      border-bottom: 2px solid #facc15;
      letter-spacing: 0.5px;
    }

    thead tr {
      border-bottom: 3px solid #facc15;
    }

    tr:hover {
      background: #374151;
    }

    tr.dallas-win {
      background-color: rgba(37, 99, 235, 0.35);
      font-weight: bold;
    }

    tr.houston-win {
      background-color: rgba(220, 38, 38, 0.35);
      font-weight: bold;
    }

    /* COLUMN WIDTHS */
    table th:nth-child(1), table td:nth-child(1) { width: 8%; }
    table th:nth-child(2), table td:nth-child(2) { width: 12%; }
    table th:nth-child(3), table td:nth-child(3) { width: 12%; }
    table th:nth-child(4), table td:nth-child(4) { width: 48%; }
    table th:nth-child(5), table td:nth-child(5) { width: 20%; }

    @media (max-width: 768px) {
      .hero {
        margin-top: 160px;
      }

      .hero h1 {
        font-size: 38px;
      }
    }

  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">
    <img src="./logo-circle.png">
    DH Cup
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="timeline.html">Timeline</a>
    <a href="history.html" class="active">History</a>
    <a href="highlights.html">Highlights</a>
    <a href="players.html">Players</a>
    <a href="streaks.html">Streaks</a>
    <a href="teammates.html">Teammates</a>
    <a href="handicap.html">Handicap History</a>
    <a href="years.html">Year by Year Results</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>DH Cup History</h1>
  <p>26 years of complete and utter greatness!</p>
</div>

<div class="content">

  <div id="recordLine" class="record"></div>
  <div id="extraStats"></div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Year</th>
          <th>Winner</th>
          <th>Score</th>
          <th>Location</th>
          <th>MVP</th>
        </tr>
      </thead>
      <tbody id="historyTable"></tbody>
    </table>
  </div>

</div>

<script>
fetch('history.json')
  .then(response => response.json())
  .then(data => {

    const table = document.getElementById('historyTable');

    let dallasWins = 0;
    let houstonWins = 0;
    let totalMatches = data.length;

    let largestMargin = 0;
    let largestMatch = "";
    let largestYear = "";
    let largestTeam = "";

    data.forEach(item => {

      let winner = item.winner.toLowerCase();
      let rowClass = "";

      if (winner.includes("dallas")) {
        dallasWins++;
        rowClass = "dallas-win";
      }

      if (winner.includes("houston")) {
        houstonWins++;
        rowClass = "houston-win";
      }

      // Largest margin logic
      if (item.score && item.score.includes("&")) {
        let margin = parseInt(item.score.split("&")[0]);

        if (margin > largestMargin) {
          largestMargin = margin;
          largestMatch = item.score;
          largestYear = item.year;
          largestTeam = item.winner;
        }
      }

      table.innerHTML += `
        <tr class="${rowClass}">
          <td>${item.year}</td>
          <td>${item.winner}</td>
          <td>${item.score}</td>
          <td>${item.location}</td>
          <td>${item.mvp}</td>
        </tr>
      `;
    });

    const recordEl = document.getElementById("recordLine");
    const extraEl = document.getElementById("extraStats");

    // Leader line
    if (dallasWins > houstonWins) {
      recordEl.textContent = `Dallas Leads All-Time: ${dallasWins} – ${houstonWins}`;
      recordEl.classList.add("dallas");
    } 
    else if (houstonWins > dallasWins) {
      recordEl.textContent = `Houston Leads All-Time: ${houstonWins} – ${houstonWins}`;
      recordEl.classList.add("houston");
    } 
    else {
      recordEl.textContent = `All-Time Series Tied: ${dallasWins} – ${houstonWins}`;
    }

    // Win %
    let dallasPct = Math.round((dallasWins / totalMatches) * 100);
    let houstonPct = Math.round((houstonWins / totalMatches) * 100);

    let winPercentText = "";

    if (dallasWins > houstonWins) {
      winPercentText = `Dallas Win %: ${dallasPct}% | Houston Win %: ${houstonPct}%`;
    } else {
      winPercentText = `Houston Win %: ${houstonPct}% | Dallas Win %: ${dallasPct}%`;
    }

    // Extra stats line
    extraEl.innerHTML = `
      Total Matches: ${totalMatches} |
      ${winPercentText} <br>
      Largest Margin: ${largestMatch} — ${largestTeam} (${largestYear})
    `;
  });
</script>

</body>
</html>
