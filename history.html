
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      z-index: 999;
      flex-wrap: wrap;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-left img {
      height: 55px;
      border-radius: 50%;
    }

    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .nav-links a:hover {
      color: gold;
    }

    /* ✅ MOBILE NAV FIX */
    @media (max-width: 768px) {
      .nav {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav-links {
        width: 100%;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .nav-links a {
        margin-right: 10px;
      }
    }

    /* HERO */
    .hero {
      margin-top: 120px;
      padding: 120px 20px;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
                  url("./golf-bg.jpg");
      background-size: cover;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 20px;
    }

    /* CONTENT */
    .content {
      width: 98%;
      max-width: 1600px;
      margin: 40px auto;
      padding: 20px;
    }

    .record {
      text-align: center;
      font-size: 30px;
      color: #60a5fa;
      margin-bottom: 30px;
      font-weight: bold;
    }

    /* TABLE */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #444;
      text-align: left;
      white-space: nowrap;
    }

    /* ✅ LOCATION WRAPS */
    td.location-col {
      white-space: normal;
      line-height: 1.3;
    }

    th {
      color: gold;
    }

    tr:hover {
      background: #374151;
    }

    /* MOBILE TEXT ADJUSTMENTS */
    @media (max-width: 768px) {
      .hero {
        margin-top: 160px;
      }

      .hero h1 {
        font-size: 38px;
      }

      .record {
        font-size: 22px;
      }
    }

  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">
    <img src="./logo-circle.png">
    DH Cup
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="timeline.html">Timeline</a>
    <a href="history.html">History</a>
    <a href="highlights.html">Highlights</a>
    <a href="players.html">Players</a>
    <a href="streaks.html">Streaks</a>
    <a href="teammates.html">Teammates</a>
    <a href="handicap.html">Handicap History</a>
    <a href="years.html">Year by Year Results</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>DH Cup History</h1>
  <p>26 years of complete and utter greatness!</p>
</div>

<div class="content">

  <div class="record">
    Houston Leads All-Time: 15 – 12
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Year</th>
          <th>Winner</th>
          <th>Score</th>
          <th>Location</th>
          <th>MVP</th>
        </tr>
      </thead>
      <tbody id="historyTable"></tbody>
    </table>
  </div>

</div>

<script>
fetch('history.json')
  .then(response => response.json())
  .then(data => {
    const table = document.getElementById('historyTable');

    data.forEach(item => {
      const row = `
        <tr>
          <td>${item.year}</td>
          <td>${item.winner}</td>
          <td>${item.score}</td>
          <td class="location-col">${item.location}</td>
          <td>${item.mvp}</td>
        </tr>
      `;
      table.innerHTML += row;
    });
  });
</script>

</body>
</html>
