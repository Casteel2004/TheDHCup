
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
    }

    .nav-left img {
      height: 55px;
      border-radius: 50%;
    }

    .nav-links a {
      color: #38bdf8;
      margin-left: 10px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .hero {
      margin-top: 100px;
      padding: 120px 20px;
      text-align: center;
      background: url("./golf-bg.jpg") center/cover;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
    }

    .hero p {
      font-size: 20px;
    }

    .content {
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
    }

    .record {
      text-align: center;
      font-size: 30px;
      color: #60a5fa;
      margin-bottom: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #444;
    }

    th {
      color: gold;
    }

    tr:hover {
      background: #374151;
    }

  </style>
</head>

<body>

<div class="nav">
  <div class="nav-left">
    ./logo-circle.png
    DH Cup
  </div>

  <div class="nav-links">
    index.html
    history.htmlHistory</a>
  </div>
</div>

<div class="hero">
  <h1>DH Cup History</h1>
  <p>26 years of complete and utter greatness!</p>
</div>

<div class="content">

  <div class="record">
    Houston Leads All-Time: 15 – 12
  </div>

  <table>
    <thead>
      <tr>
        <th>Year</th>
        <th>Winner</th>
        <th>Score</th>
        <th>Location</th>
        <th>MVP</th>
      </tr>
    </thead>
    <tbody id="historyTable"></tbody>
  </table>

</div>

<script>
fetch('history.json')
  .then(response => response.json())
  .then(data => {
    const table = document.getElementById('historyTable');

    data.forEach(item => {
      const row = `
        <tr>
          <td>${item.year}</td>
          <td>${item.winner}</td>
          <td>${item.score}</td>
          <td>${item.location}</td>
          <td>${item.mvp}</td>
        </tr>
      `;
      table.innerHTML += row;
    });
  });
</script>

</body>
</html>
