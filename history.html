
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup History</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    /* ✅ NAV (NOW MATCHES HOME PAGE EXACTLY) */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
      padding: 12px 30px;
      box-sizing: border-box;
      flex-wrap: wrap; /* ✅ critical */
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      color: gold;
      font-weight: bold;
    }

    .nav-left img {
      height: 60px;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;              /* ✅ allows wrapping */
      justify-content: flex-end;    /* ✅ keeps right aligned */
      gap: 10px;
      margin-top: 5px;              /* ✅ aligns vertically */
    }

    .nav-links a {
      text-decoration: none;
      color: #38bdf8;
      font-weight: bold;
      font-size: 13px;
    }

    .nav-links a:hover {
      color: gold;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    /* HERO */
    .hero {
      margin-top: 120px;
      padding: 120px 20px;
      text-align: center;
      background: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)),
                  url("./golf-bg.jpg");
      background-size: cover;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 20px;
    }

    /* CONTENT */
    .content {
      width: 98%;
      max-width: 1600px;
      margin: 40px auto;
      padding: 20px;
    }

    .record {
      text-align: center;
      font-size: 30px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .record.dallas { color: #60a5fa; }
    .record.houston { color: #f87171; }

    #extraStats {
      text-align: center;
      font-size: 18px;
      margin-bottom: 30px;
    }

    /* TABLE */
    .table-container {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
      table-layout: fixed;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    th {
      color: gold;
      border-bottom: 2px solid #facc15;
    }

    thead tr {
      border-bottom: 3px solid #facc15;
    }

    tr:hover {
      background: #374151;
    }

    /* ROW COLORS */
    tr.dallas-win { background-color: rgba(37,99,235,.35); }
    tr.houston-win { background-color: rgba(220,38,38,.35); }

    /* COLUMN WIDTHS */
    table th:nth-child(1), table td:nth-child(1) { width: 8%; }
    table th:nth-child(2), table td:nth-child(2) { width: 12%; }
    table th:nth-child(3), table td:nth-child(3) { width: 12%; }
    table th:nth-child(4), table td:nth-child(4) { width: 48%; }
    table th:nth-child(5), table td:nth-child(5) { width: 20%; }
  </style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div class="nav-left">
    <img src="./logo-circle.png">
    DH Cup
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="timeline.html">Timeline</a>
    <a href="history.html" class="active">History</a>
    <a href="highlights.html">Highlights</a>
    <a href="players.html">Players</a>
    <a href="streaks.html">Streaks</a>
    <a href="teammates.html">Teammates</a>
    <a href="handicap.html">Handicap History</a>
    <a href="years.html">Year by Year Results</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>DH Cup History</h1>
  <p>26 years of complete and utter greatness!</p>
</div>

<div class="content">

  <div id="recordLine" class="record"></div>
  <div id="extraStats"></div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>Year</th>
          <th>Winner</th>
          <th>Score</th>
          <th>Location</th>
          <th>MVP</th>
        </tr>
      </thead>
      <tbody id="historyTable"></tbody>
    </table>
  </div>

</div>

<script>
fetch('history.json')
.then(res => res.json())
.then(data => {

  let dallas = 0;
  let houston = 0;

  let largestMargin = 0;
  let largestScore = "";
  let largestYear = "";
  let largestTeam = "";

  const table = document.getElementById("historyTable");

  data.forEach(item => {

    let winner = (item.winner || "").toLowerCase();
    let rowClass = "";

    if (winner.includes("dallas")) {
      dallas++;
      rowClass = "dallas-win";
    } 
    else if (winner.includes("houston")) {
      houston++;
      rowClass = "houston-win";
    }

    if (item.score && item.score.includes("to")) {

      let parts = item.score.split("to");
      let a = parseFloat(parts[0]);
      let b = parseFloat(parts[1]);

      if (!isNaN(a) && !isNaN(b)) {
        let margin = Math.abs(a - b);

        if (margin > largestMargin) {
          largestMargin = margin;
          largestScore = item.score;
          largestYear = item.year;
          largestTeam = item.winner;
        }
      }
    }

    table.innerHTML += `
      <tr class="${rowClass}">
        <td>${item.year}</td>
        <td>${item.winner}</td>
        <td>${item.score}</td>
        <td>${item.location}</td>
        <td>${item.mvp}</td>
      </tr>`;
  });

  const record = document.getElementById("recordLine");
  const stats = document.getElementById("extraStats");

  if (houston > dallas) {
    record.textContent = `Houston Leads All-Time: ${houston} – ${dallas}`;
    record.classList.add("houston");
  } else if (dallas > houston) {
    record.textContent = `Dallas Leads All-Time: ${dallas} – ${houston}`;
    record.classList.add("dallas");
  } else {
    record.textContent = `All-Time Series Tied: ${dallas} – ${houston}`;
  }

  let total = data.length;
  let dPct = Math.round((dallas / total) * 100);
  let hPct = Math.round((houston / total) * 100);

  let winText =
    houston > dallas
      ? `Houston Win %: ${hPct}% | Dallas Win %: ${dPct}%`
      : `Dallas Win %: ${dPct}% | Houston Win %: ${hPct}%`;

  stats.innerHTML = `
    Total Matches: ${total} | ${winText}<br>
    Largest Margin: ${largestScore} — ${largestTeam} (${largestYear})
  `;
});
</script>

</body>
</html>
