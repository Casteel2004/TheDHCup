
<!DOCTYPE html>
<html>
<head>
  <title>💀 DH Cup Beatdowns</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    h1 { color: #38bdf8; }

    .row {
      background: #121a2b;
      margin: 10px auto;
      padding: 15px;
      border-radius: 10px;
      width: 80%;
      max-width: 700px;
    }

    .big {
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>💀 Top Beatdowns in DH Cup History</h1>

<div id="list">Loading...</div>

<script>

fetch('blowouts.json')
  .then(res => res.json())
  .then(data => {

    let html = "";

    data.forEach((m, i) => {

      let winner = m.result === "Dallas"
        ? m.dallas.join(" / ")
        : m.houston.join(" / ");

      let loser = m.result === "Dallas"
        ? m.houston.join(" / ")
        : m.dallas.join(" / ");

      html += `
        <div class="row">
          <p class="big">#${i+1} ${winner} destroyed ${loser}</p>
          <p>${m.score} (${m.year})</p>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;

  });

</script>

</body>
</html>
