
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup 💀 Savage Mode</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 30px;
    }

    .card {
      background: #121a2b;
      margin: 20px auto;
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      max-width: 600px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .big {
      font-size: 22px;
      font-weight: bold;
    }

    .sub {
      color: #ccc;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>🏆 DH Cup – Savage Mode 💀</h1>

<div class="card" id="blowouts"></div>
<div class="card" id="rivalries"></div>

<script>

// ----------------------
// 💀 BLOWOUT LOGIC
// ----------------------

fetch('blowouts.json')
  .then(res => res.json())
  .then(data => {

    let top = data[0];

    if (top) {

      let winnerTeam =
        top.result === "Dallas"
          ? top.dallas.join(" / ")
          : top.houston.join(" / ");

      let loserTeam =
        top.result === "Dallas"
          ? top.houston.join(" / ")
          : top.dallas.join(" / ");

      document.getElementById('blowouts').innerHTML =
        `<h2>💀 Worst Beatdown</h2>
         <p class="big">${winnerTeam} DESTROYED ${loserTeam}</p>
         <p>${top.score} (${top.year})</p>
         <p class="sub">Somebody check on them...</p>`;
    }
  });


// ----------------------
// 😈 RIVALRY LOGIC
// ----------------------

fetch('rivalries.json')
  .then(res => res.json())
  .then(data => {

    let best = null;

    Object.keys(data).forEach(player => {
      data[player].forEach(r => {

        let diff = r.W - r.L;

        if (!best || Math.abs(diff) > Math.abs(best.diff)) {
          best = {
            player,
            opponent: r.opponent,
            diff,
            W: r.W,
            L: r.L,
            T: r.T
          };
        }

      });
    });

    if (best) {

      let label = best.diff > 0
        ? "OWNS"
        : "IS OWNED BY";

      let savageNote = best.diff > 0
        ? "Rent free living situation"
        : "This matchup is NOT competitive";

      document.getElementById('rivalries').innerHTML =
        `<h2>😈 Most One-Sided Rivalry</h2>
         <p class="big">${best.player} ${label} ${best.opponent}</p>
         <p>${best.W}-${best.L}-${best.T}</p>
         <p class="sub">${savageNote}</p>`;
    }

  });

</script>

</body>
</html>
