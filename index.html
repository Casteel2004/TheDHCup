
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup 💀 Savage Mode</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }

    h1 { color: #38bdf8; }

    .card {
      background: #121a2b;
      margin: 20px auto;
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      max-width: 600px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .big {
      font-size: 22px;
      font-weight: bold;
    }

    .sub {
      color: #ccc;
      font-size: 14px;
    }

    .link {
      margin-top: 20px;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<h1>🏆 DH Cup – Savage Mode 💀</h1>

<div class="card" id="blowouts">Loading beatdowns...</div>
<div class="card" id="rivalries">Loading rivalries...</div>

<!-- ✅ THIS IS YOUR LINK (now permanent) -->
<div class="link">
  <p>
    <a href="blowouts.html">💀 View Full Beatdown List →</a>
  </p>
</div>

<script>

// ======================
// 💀 BLOWOUT (STABLE VERSION)
// ======================

fetch('blowouts.json')
  .then(res => res.json())
  .then(data => {

    let valid = null;

    for (let m of data) {
      if (
        m &&
        m.dallas && m.dallas.length &&
        m.houston && m.houston.length &&
        m.score &&
        m.result
      ) {
        valid = m;
        break;
      }
    }

    if (!valid) {
      document.getElementById('blowouts').innerHTML =
        "<h2>💀 Worst Beatdown</h2><p>No valid data found</p>";
      return;
    }

    let winner = valid.result === "Dallas"
      ? valid.dallas.join(" / ")
      : valid.houston.join(" / ");

    let loser = valid.result === "Dallas"
      ? valid.houston.join(" / ")
      : valid.dallas.join(" / ");

    document.getElementById('blowouts').innerHTML =
      `<h2>💀 Worst Beatdown</h2>
       <p class="big">${winner} DESTROYED ${loser}</p>
       <p>${valid.score} (${valid.year})</p>
       <p class="sub">No mercy was shown.</p>`;
  });


// ======================
// 😈 RIVALRY (WORKING VERSION)
// ======================

fetch('rivalries.json')
  .then(res => res.json())
  .then(data => {

    let best = null;

    Object.keys(data).forEach(player => {
      data[player].forEach(r => {

        let diff = r.W - r.L;

        if (!best || Math.abs(diff) > Math.abs(best.diff)) {
          best = {
            player,
            opponent: r.opponent,
            diff,
            W: r.W,
            L: r.L,
            T: r.T
          };
        }

      });
    });

    let label = best.diff > 0
      ? "OWNS"
      : "IS OWNED BY";

    let note = best.diff > 0
      ? "Rent free living situation"
      : "This matchup is NOT competitive";

    document.getElementById('rivalries').innerHTML =
      `<h2>😈 Most One-Sided Rivalry</h2>
       <p class="big">${best.player} ${label} ${best.opponent}</p>
       <p>${best.W}-${best.L}-${best.T}</p>
       <p class="sub">${note}</p>`;
  });

</script>

</body>
</html>
