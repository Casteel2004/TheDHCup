
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup 💀 Savage Mode</title>
  <style>

    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      color: #38bdf8;
      margin-top: 20px;
    }

    .header {
      padding: 20px;
    }

    .intro {
      max-width: 600px;
      margin: 0 auto;
      color: #ccc;
    }

    .nav {
      margin: 25px 0;
    }

    .nav a {
      margin: 10px;
      padding: 10px 15px;
      background: #121a2b;
      border-radius: 8px;
      text-decoration: none;
      color: #38bdf8;
      font-weight: bold;
      display: inline-block;
    }

    .nav a:hover {
      background: #1e293b;
    }

    .card {
      background: #121a2b;
      margin: 20px auto;
      padding: 20px;
      border-radius: 12px;
      width: 80%;
      max-width: 600px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    .big {
      font-size: 22px;
      font-weight: bold;
    }

    .sub {
      color: #ccc;
      font-size: 14px;
    }

    .section-title {
      margin-top: 40px;
      font-size: 20px;
      color: #38bdf8;
    }

  </style>
</head>

<body>

<!-- ✅ HEADER -->
<div class="header">
  <h1>🏆 DH Cup – Savage Mode 💀</h1>
  <p class="intro">
    The official (and brutally honest) record of DH Cup history.
    Every win remembered. Every loss documented. No excuses.
  </p>
</div>

<!-- ✅ NAVIGATION -->
<div class="nav">
  <a href="blowouts.html">💀 Top Beatdowns</a>
  <!-- future pages -->
  <!-- <a href="rivalries.html">😈 Rivalries</a> -->
  <!-- <a href="partners.html">🤝 Partners</a> -->
</div>

<!-- ✅ FEATURED STATS -->
<div class="section-title">
  🔥 Featured Receipts
</div>

<div class="card" id="blowouts">Loading beatdowns...</div>
<div class="card" id="rivalries">Loading rivalries...</div>

<script>

// ======================
// 💀 BLOWOUT (WITH FORMAT)
// ======================

fetch('blowouts.json')
  .then(res => res.json())
  .then(data => {

    let valid = null;

    for (let m of data) {
      if (
        m &&
        m.dallas && m.dallas.length &&
        m.houston && m.houston.length &&
        m.score &&
        m.result
      ) {
        valid = m;
        break;
      }
    }

    if (!valid) {
      document.getElementById('blowouts').innerHTML =
        "<h2>💀 Worst Beatdown</h2><p>No valid data found</p>";
      return;
    }

    let winner = valid.result === "Dallas"
      ? valid.dallas.join(" / ")
      : valid.houston.join(" / ");

    let loser = valid.result === "Dallas"
      ? valid.houston.join(" / ")
      : valid.dallas.join(" / ");

    document.getElementById('blowouts').innerHTML =
      `<h2>💀 Worst Beatdown</h2>
       <p class="big">${winner} DESTROYED ${loser}</p>
       <p>${valid.score} (${valid.year})</p>
       <p class="sub">${valid.format || "Format unknown"}</p>`;
  });


// ======================
// 😈 RIVALRY
// ======================

fetch('rivalries.json')
  .then(res => res.json())
  .then(data => {

    let best = null;

    Object.keys(data).forEach(player => {
      data[player].forEach(r => {

        let diff = r.W - r.L;

        if (!best || Math.abs(diff) > Math.abs(best.diff)) {
          best = {
            player,
            opponent: r.opponent,
            diff,
            W: r.W,
            L: r.L,
            T: r.T
          };
        }

      });
    });

    let label = best.diff > 0
      ? "OWNS"
      : "IS OWNED BY";

    let note = best.diff > 0
      ? "Rent free living situation"
      : "This matchup is NOT competitive";

    document.getElementById('rivalries').innerHTML =
      `<h2>😈 Most One-Sided Rivalry</h2>
       <p class="big">${best.player} ${label} ${best.opponent}</p>
       <p>${best.W}-${best.L}-${best.T}</p>
       <p class="sub">${note}</p>`;
  });

</script>

</body>
</html>
