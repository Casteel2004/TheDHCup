
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup 💀 Savage Mode</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }
    h1 { color: #38bdf8; }
    .card {
      background: #121a2b;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🏆 DH Cup – Savage Mode</h1>

<div class="card" id="blowouts"></div>
<div class="card" id="rivalries"></div>

<script>
fetch('blowouts.json')
  .then(res => res.json())
  .then(data => {
    const top = data[0];
    if (top) {
      document.getElementById('blowouts').innerHTML =
        `<h2>💀 Worst Beatdown</h2>
       <p>${top.dallas.join(' / ')} vs ${top.houston.join(' / ')}</p>
<p>Winner: ${top.result === 'Dallas' ? 'Dallas Team' : 'Houston Team'}</p>
``
         <p>${top.score} (${top.year})</p>`;
    }
  });

fetch('rivalries.json')
  .then(res => res.json())
  .then(data => {
    const players = Object.keys(data);
    const p = players[0];
    const rival = data[p][0];

    document.getElementById('rivalries').innerHTML =
      `<h2>😈 Rivalry</h2>
       <p>${p} vs ${rival.opponent}</p>
       <p>${p}: ${rival.W}-${rival.L}-${rival.T}</p>`;
  });
</script>

</body>
</html>
