
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup 💀 Savage Mode</title>
  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      text-align: center;
    }
    h1 { color: #38bdf8; }
    .card {
      background: #121a2b;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🏆 DH Cup – Savage Mode</h1>

<div class="card" id="blowouts"></div>
<div class="card" id="rivalries"></div>

<script>
fetch('blowouts.json')
  .then(res => res.json())
  .then(data => {
    const top = data[0];
    if (top) {
      document.getElementById('blowouts').innerHTML =
        `<h2>💀 Worst Beatdown</h2>
       <p>${top.dallas.join(' / ')} vs ${top.houston.join(' / ')}</p>
<p>Winner: ${top.result === 'Dallas' ? 'Dallas Team' : 'Houston Team'}</p>
``
         <p>${top.score} (${top.year})</p>`;
    }
  });


fetch('rivalries.json')
  .then(res => res.json())
  .then(data => {

    let best = null;

    Object.keys(data).forEach(player => {
      data[player].forEach(r => {
        const diff = r.W - r.L;

        if (!best || Math.abs(diff) > Math.abs(best.diff)) {
          best = {
            player,
            opponent: r.opponent,
            diff,
            W: r.W,
            L: r.L,
            T: r.T
          };
        }
      });
    });

    if (best) {
      const label = best.diff > 0
        ? "OWNS"
        : "OWNED BY";

      document.getElementById('rivalries').innerHTML =
        `<h2>😈 Rivalry</h2>
         <p><strong>${best.player}</strong> ${label} ${best.opponent}</p>
         <p>${best.W}-${best.L}-${best.T}</p>`;
    }
  });
``

</script>

</body>
</html>
