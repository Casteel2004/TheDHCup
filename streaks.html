
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Streaks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    /* ✅ NAV FIXED */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 999;
    }

    .nav-left {
      display: flex;
      align-items: center;
      color: gold;
      font-weight: bold;
      font-size: 20px;
      gap: 10px;
    }

    .nav-left img {
      height: 40px;
    }

    .nav-links a {
      color: #38bdf8;
      margin-left: 12px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .nav-links a:hover {
      color: gold;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    /* ✅ HERO FIX (THIS WAS BROKEN) */
    .hero {
      margin-top: 80px;
      height: 400px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.4)),
                  url("./golf-bg-streaks.jpg");

      background-size: cover; /* ✅ FIXED */
      background-position: center;
      background-repeat: no-repeat;

      text-align: center;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
      margin: 0;
    }

    .hero p {
      color: gold;
      font-weight: bold;
      font-size: 20px;
      margin-top: 10px;
    }

    /* ✅ CONTENT */
    .content {
      width: 95%;
      max-width: 1400px;
      margin: 40px auto;
    }

    h2 {
      text-align: center;
      color: #60a5fa;
      margin-top: 40px;
    }

    h3 {
      text-align: center;
    }

    .table-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .half {
      width: 48%;
      min-width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    th {
      color: gold;
    }

    tr:hover {
      background: #374151;
    }

    .dallas-header { color: #60a5fa; }
    .houston-header { color: #f87171; }
  </style>
</head>

<body>

<!-- ✅ NAV RESTORED -->
<div class="nav">
  <div class="nav-left">
    <img src="./logo-circle.png">
    DH Cup
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="timeline.html">Timeline</a>
    <a href="history.html">History</a>
    <a href="highlights.html">Highlights</a>
    <a href="players.html">Players</a>
    <a href="streaks.html" class="active">Streaks</a>
    <a href="teammates.html">Teammates</a>
    <a href="handicap.html">Handicap</a>
    <a href="years.html">Years</a>
  </div>
</div>

<div class="hero">
  <h1>DH Cup Streaks</h1>
  <p>We're going streaking....</p>
</div>

<div class="content" id="content"></div>

<script>
fetch("streaks.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("content");

  function formatCell(val) {
    if (!val) return "<td></td>";

    if (val.includes("W")) return `<td style="background:rgba(34,197,94,.4);">${val}</td>`;
    if (val.includes("L")) return `<td style="background:rgba(239,68,68,.4);">${val}</td>`;
    return `<td style="background:rgba(250,204,21,.4);">${val}</td>`;
  }

  function buildPlayerTable(rows) {
    rows.sort((a, b) => a.Player.localeCompare(b.Player));

    let html = `
      <table>
      <thead>
        <tr>
          <th>Player</th>
          <th>Best Ball</th>
          <th>Scramble</th>
          <th>Singles</th>
        </tr>
      </thead>
      <tbody>
    `;

    rows.forEach(r => {
      html += `
        <tr>
          <td>${r.Player}</td>
          ${formatCell(r.BestBall)}
          ${formatCell(r.Scramble)}
          ${formatCell(r.Singles)}
        </tr>
      `;
    });

    return html + "</tbody></table>";
  }

  function buildTable(rows) {
    if (!rows) return "";

    let html = "<table><thead><tr><th>Player</th><th>#</th></tr></thead><tbody>";

    rows.forEach(r => {
      html += `<tr><td>${r.Player}</td><td>${r.Matches}</td></tr>`;
    });

    return html + "</tbody></table>";
  }

  function section(title, obj) {
    return `
      <h2>${title}</h2>
      <div class="table-row">
        <div class="half">
          <h3 class="dallas-header">Dallas</h3>
          ${buildTable(obj.dallas)}
        </div>
        <div class="half">
          <h3 class="houston-header">Houston</h3>
          ${buildTable(obj.houston)}
        </div>
      </div>
    `;
  }

  // ✅ CURRENT PLAYER STREAKS
  container.innerHTML += `
    <h2>Current Player Streaks</h2>
    <div class="table-row">
      <div class="half">
        ${buildPlayerTable(data.currentPlayerStreaks.dallas)}
      </div>
      <div class="half">
        ${buildPlayerTable(data.currentPlayerStreaks.houston)}
      </div>
    </div>
  `;

  // ✅ TOTAL SECTION
  container.innerHTML += section("Longest Active Winning Streaks - Total", data.total.currentWins);
  container.innerHTML += section("Longest Winning Streaks - Total", data.total.allTimeWins);
  container.innerHTML += section("Longest Active Losing Streaks - Total", data.total.currentLosses);
  container.innerHTML += section("Longest Losing Streaks - Total", data.total.allTimeLosses);

  // ✅ FORMAT SECTIONS
  function formatBlock(name, obj) {
    container.innerHTML += `<h2>${name} Streaks</h2>`;
    container.innerHTML += section("Active Wins", obj.currentWins);
    container.innerHTML += section("Active Losses", obj.currentLosses);
  }

  formatBlock("Scramble", data.scramble);
  formatBlock("Best Ball", data.bestBall);
  formatBlock("Singles", data.singles);

});
</script>

</body>
</html>
``
