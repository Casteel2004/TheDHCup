
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Streaks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
      padding: 12px 30px;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-left img {
      height: 40px;
    }

    .nav-links a {
      color: #38bdf8;
      text-decoration: none;
      margin-left: 10px;
      font-size: 13px;
      font-weight: bold;
    }

    .nav-links a:hover { color: gold; }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    .hero {
      margin-top: 80px;
      height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.4)),
                  url("./golf-bg-streaks.jpg");

      background-size: cover;
      background-position: center;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
      margin: 0;
    }

    .hero p {
      color: gold;
      font-weight: bold;
      font-size: 20px;
      margin-top: 10px;
    }

    .content {
      width: 95%;
      max-width: 1400px;
      margin: 40px auto;
    }

    h2 {
      text-align: center;
      color: #60a5fa;
      margin-top: 40px;
    }

    h3 {
      text-align: center;
    }

    .table-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .half {
      width: 48%;
      min-width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    th {
      color: gold;
    }

    .dallas-header { color: #60a5fa; }
    .houston-header { color: #f87171; }
  </style>
</head>

<body>

<div class="nav">
  <div class="nav-left">
    <img src="./logo-circle.png">
    DH Cup
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="timeline.html">Timeline</a>
    <a href="history.html">History</a>
    <a href="highlights.html">Highlights</a>
    <a href="players.html">Players</a>
    <a class="active" href="streaks.html">Streaks</a>
    <a href="teammates.html">Teammates</a>
    <a href="handicap.html">Handicap</a>
    <a href="years.html">Years</a>
  </div>
</div>

<div class="hero">
  <h1>DH Cup Streaks</h1>
  <p>We're going streaking....</p>
</div>

<div class="content" id="content"></div>

<script>
fetch("streaks.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("content");

  function buildTable(rows) {
    let html = "<table><thead><tr><th>Player</th><th># of Matches</th></tr></thead><tbody>";

    rows.forEach(r => {
      html += `<tr><td>${r.Player}</td><td>${r.Matches}</td></tr>`;
    });

    return html + "</tbody></table>";
  }

  function section(title, dallas, houston) {
    return `
      <h2>${title}</h2>
      <div class="table-row">
        <div class="half">
          <h3 class="dallas-header">Team Dallas</h3>
          ${buildTable(dallas)}
        </div>
        <div class="half">
          <h3 class="houston-header">Team Houston</h3>
          ${buildTable(houston)}
        </div>
      </div>
    `;
  }

  // ✅ TOTAL ONLY (THIS WAS WORKING BEFORE)
  container.innerHTML += section(
    "Longest Active Winning Streaks - Total",
    data.total.currentWins.dallas,
    data.total.currentWins.houston
  );

  container.innerHTML += section(
    "Longest Winning Streaks - Total",
    data.total.allTimeWins.dallas,
    data.total.allTimeWins.houston
  );

  container.innerHTML += section(
    "Longest Active Losing Streaks - Total",
    data.total.currentLosses.dallas,
    data.total.currentLosses.houston
  );

  container.innerHTML += section(
    "Longest Losing Streaks - Total",
    data.total.allTimeLosses.dallas,
    data.total.allTimeLosses.houston
  );

});
</script>

</body>
</html>
``
