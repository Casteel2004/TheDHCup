
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Streaks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    /* ✅ NAV (MATCHES YOUR OTHER PAGES) */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 999;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-left img {
      height: 40px;
    }

    .nav-links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
      margin-left: 12px;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    .nav-links a:hover {
      color: gold;
    }

    /* ✅ HERO */
    .hero {
      margin-top: 80px;
      height: 400px;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.4)),
                  url("./golf-bg-streaks.jpg");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      text-align: center;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
      margin: 0;
    }

    .hero p {
      color: gold;
      font-weight: bold;
      font-size: 20px;
      margin-top: 10px;
    }

    /* ✅ CONTENT */
    .content {
      width: 95%;
      max-width: 1400px;
      margin: 40px auto;
    }

    h2 {
      text-align: center;
      color: #60a5fa;
      margin-top: 40px;
    }

    h3 {
      text-align: center;
    }

    .table-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .half {
      width: 48%;
      min-width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    th {
      color: gold;
    }

    tr:hover {
      background: #374151;
    }

    .dallas-header { color: #60a5fa; }
    .houston-header { color: #f87171; }
  </style>
</head>

<body>

<!-- ✅ NAV -->
<div class="nav">
  <div class="nav-left">
    <img src="./logo-circle.png">
    DH Cup
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="timeline.html">Timeline</a>
    <a href="history.html">History</a>
    <a href="highlights.html">Highlights</a>
    <a href="players.html">Players</a>
    <a href="streaks.html" class="active">Streaks</a>
    <a href="teammates.html">Teammates</a>
    <a href="handicap.html">Handicap</a>
    <a href="years.html">Years</a>
  </div>
</div>

<!-- ✅ HERO -->
<div class="hero">
  <h1>DH Cup Streaks</h1>
  <p>We're going streaking....</p>
</div>

<div class="content" id="content"></div>

<script>
fetch("streaks.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("content");

  function buildTable(rows) {
    if (!rows) return "<p>No Data</p>";

    let html = "<table><tr><th>Player</th><th>#</th></tr>";

    rows.forEach(r => {
      html += `<tr><td>${r.Player}</td><td>${r.Matches}</td></tr>`;
    });

    return html + "</table>";
  }

  function section(title, obj) {
    if (!obj) return "";

    return `
      <h2>${title}</h2>
      <div class="table-row">
        <div class="half">
          <h3 class="dallas-header">Dallas</h3>
          ${buildTable(obj.dallas)}
        </div>
        <div class="half">
          <h3 class="houston-header">Houston</h3>
          ${buildTable(obj.houston)}
        </div>
      </div>
    `;
  }

  // ✅ CURRENT PLAYER STREAKS (SAFE VERSION)
  if (data.currentPlayerStreaks) {
    container.innerHTML += `
      <h2>Current Player Streaks</h2>
      <p style="text-align:center;">(Table will be added next step)</p>
    `;
  }

  // ✅ TOTAL
  if (data.total) {
    container.innerHTML += section("Active Wins - Total", data.total.currentWins);
    container.innerHTML += section("All-Time Wins - Total", data.total.allTimeWins);
    container.innerHTML += section("Active Losses - Total", data.total.currentLosses);
    container.innerHTML += section("All-Time Losses - Total", data.total.allTimeLosses);
  }

  // ✅ FORMATS
  function format(name, obj){
    if (!obj) return;

    container.innerHTML += `<h2>${name} Streaks</h2>`;
    container.innerHTML += section("Active Wins", obj.currentWins);
    container.innerHTML += section("Active Losses", obj.currentLosses);
  }

  format("Scramble", data.scramble);
  format("Best Ball", data.bestBall);
  format("Singles", data.singles);

})
.catch(err => {
  document.getElementById("content").innerHTML = "Error loading data";
});
</script>

</body>
</html>
