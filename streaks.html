
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Streaks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f172a;
      padding: 12px 30px;
    }

    .nav-left {
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-links a {
      color: #38bdf8;
      margin-left: 10px;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    .hero {
      margin-top: 100px;
      text-align: center;
      padding: 40px;
      background: linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.4)),
                  url("./golf-bg-streaks.jpg");
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
    }

    .hero p {
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .content {
      width: 95%;
      margin: 40px auto;
    }

    h2 {
      text-align: center;
      color: #60a5fa;
      margin-top: 40px;
    }

    h3 {
      text-align: center;
    }

    .table-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .half {
      width: 48%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    th {
      color: gold;
    }

    tr:hover {
      background: #374151;
    }

    .dallas-header { color: #60a5fa; }
    .houston-header { color: #f87171; }
  </style>
</head>

<body>

<div class="hero">
  <h1>DH Cup Streaks</h1>
  <p>We're going streaking....</p>
</div>

<div class="content" id="content"></div>

<script>
fetch("streaks.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("content");

  // ✅ COLOR CELLS
  function formatCell(val) {
    let color = "";

    if (val.includes("W")) color = "background: rgba(34,197,94,.4);";
    else if (val.includes("L")) color = "background: rgba(239,68,68,.4);";
    else color = "background: rgba(250,204,21,.4);";

    return `<td style="${color}">${val}</td>`;
  }

  // ✅ CURRENT PLAYER TABLE
  function buildPlayerTable(rows) {

    rows.sort((a, b) =>
      a.Player.replace(/\./g,'').localeCompare(b.Player.replace(/\./g,''))
    );

    let html = `
      <table>
        <thead>
          <tr>
            <th>Player</th>
            <th>Best Ball</th>
            <th>Scramble</th>
            <th>Singles</th>
          </tr>
        </thead>
        <tbody>
    `;

    rows.forEach(r => {
      html += `
        <tr>
          <td>${r.Player}</td>
          ${formatCell(r.BestBall)}
          ${formatCell(r.Scramble)}
          ${formatCell(r.Singles)}
        </tr>
      `;
    });

    return html + "</tbody></table>";
  }

  // ✅ GENERIC SIDE TABLE
  function buildTable(rows) {
    let html = "<table><thead><tr><th>Player</th><th># of Matches</th></tr></thead><tbody>";

    rows.forEach(r => {
      html += `<tr><td>${r.Player}</td><td>${r.Matches}</td></tr>`;
    });

    return html + "</tbody></table>";
  }

  function section(title, dallas, houston) {
    return `
      <div>
        <h2>${title}</h2>
        <div class="table-row">
          <div class="half">
            <h3 class="dallas-header">Team Dallas</h3>
            ${buildTable(dallas)}
          </div>
          <div class="half">
            <h3 class="houston-header">Team Houston</h3>
            ${buildTable(houston)}
          </div>
        </div>
      </div>
    `;
  }

  // ✅ CURRENT PLAYER STREAKS
  container.innerHTML += `
    <h2>Current Player Streaks</h2>
    <div class="table-row">
      <div class="half">
        <h3 class="dallas-header">Team Dallas</h3>
        ${buildPlayerTable(data.currentPlayerStreaks.dallas)}
      </div>
      <div class="half">
        <h3 class="houston-header">Team Houston</h3>
        ${buildPlayerTable(data.currentPlayerStreaks.houston)}
      </div>
    </div>
  `;

  // ✅ TOTAL
  container.innerHTML += section("Longest Active Winning Streaks - Total",
    data.total.currentWins.dallas, data.total.currentWins.houston);

  container.innerHTML += section("Longest Winning Streaks - Total (Min 10 Cups)",
    data.total.allTimeWins.dallas, data.total.allTimeWins.houston);

  container.innerHTML += section("Longest Active Losing Streaks - Total",
    data.total.currentLosses.dallas, data.total.currentLosses.houston);

  container.innerHTML += section("Longest Losing Streaks - Total (Min 10 Cups)",
    data.total.allTimeLosses.dallas, data.total.allTimeLosses.houston);

  // ✅ FORMAT BUILDER
  function formatBlock(name, obj) {

    container.innerHTML += `<h2>${name} Streaks</h2>`;

    container.innerHTML += section("Longest Active Winning",
      obj.currentWins.dallas, obj.currentWins.houston);

    if(obj.allTimeWins){
      container.innerHTML += section("Longest Winning Streaks",
        obj.allTimeWins.dallas, obj.allTimeWins.houston);
    }

    container.innerHTML += section("Longest Active Losing",
      obj.currentLosses.dallas, obj.currentLosses.houston);

    if(obj.allTimeLosses){
      container.innerHTML += section("Longest Losing Streaks",
        obj.allTimeLosses.dallas, obj.allTimeLosses.houston);
    }
  }

  formatBlock("Scramble", data.scramble);
  formatBlock("Best Ball", data.bestBall);
  formatBlock("Singles", data.singles);

});
</script>

</body>
</html>
