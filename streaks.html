
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Streaks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      z-index: 999;
      flex-wrap: wrap;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-left img {
      height: 55px;
      border-radius: 50%;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    .hero {
      margin-top: 100px;
      min-height: calc(100vh - 100px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.4)),
                  url("./golf-bg-streaks.jpg");

      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;

      text-align: center;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
    }

    .hero p {
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .content {
      width: 98%;
      max-width: 1600px;
      margin: 40px auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #60a5fa;
      margin-top: 40px;
    }

    .table-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .half {
      width: 48%;
      min-width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    th {
      color: gold;
    }
  </style>
</head>

<body>

<div class="nav">
  <div class="nav-left">
    <img src="./logo-circle.png">
    DH Cup
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="timeline.html">Timeline</a>
    <a href="history.html">History</a>
    <a href="highlights.html">Highlights</a>
    <a href="players.html">Players</a>
    <a href="streaks.html" class="active">Streaks</a>
    <a href="teammates.html">Teammates</a>
    <a href="handicap.html">Handicap</a>
    <a href="years.html">Years</a>
  </div>
</div>

<div class="hero">
  <h1>DH Cup Streaks</h1>
  <p>We're going streaking....</p>
</div>

<div class="content" id="content"></div>

<script>
fetch("streaks.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("content");

  function buildTable(rows) {
    let html = "<table><tr><th>Player</th><th># of Matches</th></tr>";
    rows.forEach(r => {
      html += `<tr><td>${r.Player}</td><td>${r.Matches}</td></tr>`;
    });
    return html + "</table>";
  }

  function section(title, obj) {
    return `
      <h2>${title}</h2>
      <div class="table-row">
        <div class="half">${buildTable(obj.dallas)}</div>
        <div class="half">${buildTable(obj.houston)}</div>
      </div>
    `;
  }

  // ✅ CURRENT PLAYER STREAKS
  function playerTable(rows) {
    rows.sort((a,b)=>a.Player.localeCompare(b.Player));

    let html = `
      <table>
        <tr>
          <th>Player</th>
          <th>Best Ball</th>
          <th>Scramble</th>
          <th>Singles</th>
        </tr>
    `;

    rows.forEach(r => {
      html += `<tr>
        <td>${r.Player}</td>
        <td>${r.BestBall}</td>
        <td>${r.Scramble}</td>
        <td>${r.Singles}</td>
      </tr>`;
    });

    return html + "</table>";
  }

  container.innerHTML += `
    <h2>Current Player Streaks</h2>
    <div class="table-row">
      <div class="half">${playerTable(data.currentPlayerStreaks.dallas)}</div>
      <div class="half">${playerTable(data.currentPlayerStreaks.houston)}</div>
    </div>
  `;

  // ✅ TOTAL
  container.innerHTML += section("Longest Active Winning Streaks - Total", data.total.currentWins);
  container.innerHTML += section("Longest Winning Streaks - Total", data.total.allTimeWins);
  container.innerHTML += section("Longest Active Losing Streaks - Total", data.total.currentLosses);
  container.innerHTML += section("Longest Losing Streaks - Total", data.total.allTimeLosses);

  // ✅ FORMAT SECTIONS
  function formatBlock(title, obj) {
    container.innerHTML += `<h2>${title}</h2>`;
    container.innerHTML += section("Active Wins", obj.currentWins);
    container.innerHTML += section("Active Losses", obj.currentLosses);
  }

  formatBlock("Scramble Streaks", data.scramble);
  formatBlock("Best Ball Streaks", data.bestBall);
  formatBlock("Singles Streaks", data.singles);

});
</script>

</body>
</html>
``
