
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Streaks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-sizing: border-box;
      z-index: 999;
      flex-wrap: wrap;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-left img {
      height: 55px;
      border-radius: 50%;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav-links a {
      color: #38bdf8;
      text-decoration: none;
      font-size: 13px;
      font-weight: bold;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    /* HERO */
    .hero {
      margin-top: 100px;
      min-height: 40vh;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      background: linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.4)),
                  url("./golf-bg-streaks.jpg");

      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;

      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
    }

    /* ✅ NAV BUTTONS */
    .streak-nav {
      text-align: center;
      margin: 20px 0;
    }

    .streak-nav a {
      margin: 0 10px;
      padding: 10px 20px;
      background: #1f2937;
      color: #38bdf8;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .streak-nav a:hover {
      background: #374151;
      color: gold;
    }

    .content {
      width: 95%;
      max-width: 1400px;
      margin: 40px auto;
    }

    h2 {
      text-align: center;
      color: #60a5fa;
      margin-top: 40px;
    }

    .table-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .half {
      width: 48%;
      min-width: 300px;
    }

    h3.dallas { color: #60a5fa; }
    h3.houston { color: #f87171; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    th {
      color: gold;
    }

  </style>
</head>

<body>

<div class="nav">
  <div class="nav-left">
    ./logo-circle.png
    DH Cup
  </div>
  <div class="nav-links">
    index.html">Home</a>
    highlights.htmlHighlights</a>
    streaks.html" class="active">Streaks</a>
  </div>
</div>

<div class="hero">
  <h1>DH Cup Streaks</h1>
</div>

<!-- ✅ NAV LINKS -->
<div class="streak-nav">
  Scramble</a>
  Best Ball</a>
  Singles</a>
</div>

<div class="content" id="content"></div>

<script>
fetch("streaks.json")
.then(res => res.json())
.then(data => {

  const container = document.getElementById("content");

  function playerTable(rows) {

    let html = `
      <table>
        <tr>
          <th>Player</th>
          <th>Best Ball</th>
          <th>Scramble</th>
          <th>Singles</th>
        </tr>
    `;

    rows.forEach(r => {
      html += `
        <tr>
          <td>${r.Player}</td>
          <td>${r.BestBall}</td>
          <td>${r.Scramble}</td>
          <td>${r.Singles}</td>
        </tr>
      `;
    });

    return html + "</table>";
  }

  container.innerHTML = `
    <h2>Current Player Streaks</h2>

    <div class="table-row">
      <div class="half">
        <h3 class="dallas">Team Dallas</h3>
        ${playerTable(data.currentPlayerStreaks.dallas)}
      </div>

      <div class="half">
        <h3 class="houston">Team Houston</h3>
        ${playerTable(data.currentPlayerStreaks.houston)}
      </div>
    </div>
  `;

});
</script>

</body>
</html>
