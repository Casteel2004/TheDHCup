
<!DOCTYPE html>
<html>
<head>
  <title>DH Cup Streaks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #2b3648;
      color: white;
    }

    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #0f172a;
      padding: 12px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 999;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      color: gold;
      font-weight: bold;
      font-size: 20px;
    }

    .nav-links a {
      color: #38bdf8;
      margin-left: 12px;
      text-decoration: none;
      font-weight: bold;
      font-size: 13px;
    }

    .nav-links a.active {
      color: gold;
      text-decoration: underline;
    }

    .hero {
      margin-top: 80px;
      height: 400px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(0,0,0,.3), rgba(0,0,0,.4)),
                  url("./golf-bg-streaks.jpg");
      background-size: cover;
      background-position: center;
    }

    .hero h1 {
      color: gold;
      font-size: 60px;
      margin: 0;
    }

    .hero p {
      color: gold;
      font-weight: bold;
      margin-top: 10px;
    }

    .content {
      width: 95%;
      max-width: 1400px;
      margin: 40px auto;
    }

    h2 {
      text-align: center;
      color: #60a5fa;
      margin-top: 40px;
    }

    .table-row {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .half {
      width: 48%;
      min-width: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1f2937;
    }

    th, td {
      padding: 8px;
      border-bottom: 1px solid #444;
      text-align: center;
    }

    th {
      color: gold;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>DH Cup Streaks</h1>
  <p>We're going streaking....</p>
</div>

<div class="content" id="content"></div>

<script>
fetch("streaks.json")
.then(res => res.json())
.then(data => {

  const c = document.getElementById("content");

  // ✅ FIXED TABLE BUILDER (handles both types)
  function buildTable(rows) {
    if (!rows) return "<p>No Data</p>";

    let html = "<table><tr><th>Player</th><th>Value</th></tr>";

    rows.forEach(r => {
      let value = r.Matches ?? r.BestBall ?? "-";
      html += `<tr><td>${r.Player}</td><td>${value}</td></tr>`;
    });

    return html + "</table>";
  }

  function section(title, obj) {
    if (!obj) return "";

    return `
      <h2>${title}</h2>
      <div class="table-row">
        <div class="half">
          ${buildTable(obj.dallas)}
        </div>
        <div class="half">
          ${buildTable(obj.houston)}
        </div>
      </div>
    `;
  }

  // ✅ TOTAL
  c.innerHTML += section("Active Wins - Total", data.total.currentWins);
  c.innerHTML += section("All-Time Wins - Total", data.total.allTimeWins);
  c.innerHTML += section("Active Losses - Total", data.total.currentLosses);
  c.innerHTML += section("All-Time Losses - Total", data.total.allTimeLosses);

});
</script>

</body>
</html>
